; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp-wrover-kit
framework = arduino
lib_deps = https://github.com/pschatzmann/arduino-audio-tools.git, https://github.com/pschatzmann/arduino-audio-driver.git
build_flags = -DCORE_DEBUG_LEVEL=1 -Wno-unused-variable -Wno-unused-but-set-variable -Wno-unused-function -Wno-format-extra-args -Wl,-u,_impure_ptr 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
monitor_speed = 115200
monitor_filters = esp32_exception_decoder


monitor_rts = 0
monitor_dtr = 0